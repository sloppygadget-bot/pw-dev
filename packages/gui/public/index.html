<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pw-dev</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>pw-dev</h1>
        <div id="target" class="muted"><a href="/api-docs" title="Open the live API documentation">API Docs</a></div>
      </div>
      <div class="toolbar">
        <label class="inline-field">
          <span>Refresh</span>
          <select id="interval">
            <option value="2000">2s</option>
            <option value="5000" selected>5s</option>
            <option value="10000">10s</option>
            <option value="0">Paused</option>
          </select>
        </label>
        <button id="refresh" type="button" title="Refresh now">Refresh</button>
      </div>
    </header>

    <main>
      <section class="status-grid" aria-label="Status summary">
        <div class="metric">
          <span class="metric-label">Server</span>
          <strong id="server-state">Unknown</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Broker</span>
          <div id="broker-state" class="metric-stack">Unknown</div>
        </div>
        <div class="metric">
          <span class="metric-label">Sessions</span>
          <strong id="sessions-state">Unknown</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Updated</span>
          <strong id="updated-at">Never</strong>
        </div>
      </section>

      <section class="layout">
        <aside class="nav" aria-label="Entity counts">
          <button class="nav-item active" data-view="topology" type="button">
            <span>Topology</span><b id="count-topology">0</b>
          </button>
          <button class="nav-item" data-view="apps" type="button">
            <span>Apps</span><b id="count-apps">0</b>
          </button>
          <button class="nav-item" data-view="broker" type="button">
            <span>Brokers</span><b id="count-broker">0</b>
          </button>
          <button class="nav-item" data-view="browsers" type="button">
            <span>Browser Templates</span><b id="count-browsers">0</b>
          </button>
          <button class="nav-item" data-view="sessions" type="button">
            <span>Sessions</span><b id="count-sessions">0</b>
          </button>
          <button class="nav-item" data-view="proxies" type="button">
            <span>Proxies</span><b id="count-proxies">0</b>
          </button>
        </aside>

        <div class="content">
          <section class="view active" id="view-topology">
            <div class="section-title">
              <h2>Topology</h2>
              <div class="section-actions">
                <div class="toggle-group" role="group" aria-label="Topology renderer">
                  <button class="toggle-btn active" data-renderer="mermaid" type="button">Mermaid</button>
                  <button class="toggle-btn" data-renderer="d3" type="button">D3</button>
                </div>
                <span id="read-only" class="badge neutral">Read-only</span>
              </div>
            </div>
            <div id="topology-cards" class="topology-stack"></div>
            <div id="topology-context" class="markdown-view card"></div>
          </section>

          <section class="view" id="view-apps">
            <div class="section-title"><h2>Apps</h2></div>
            <div id="apps-list" class="cards"></div>
          </section>

          <section class="view" id="view-broker">
            <div class="section-title"><h2>Broker</h2></div>
            <div id="broker-list" class="cards"></div>
          </section>

          <section class="view" id="view-browsers">
            <div class="section-title"><h2>Browser Templates</h2></div>
            <div id="browsers-list" class="cards"></div>
          </section>

          <section class="view" id="view-sessions">
            <div class="section-title"><h2>Sessions</h2></div>
            <div id="sessions-list" class="cards"></div>
          </section>


          <section class="view" id="view-proxies">
            <div class="section-title"><h2>Proxies</h2></div>
            <div id="proxies-list" class="cards"></div>
          </section>
        </div>
      </section>
    </main>

    <template id="empty-template">
      <div class="empty">No records</div>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
